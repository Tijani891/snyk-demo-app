apiVersion: apps/v1
kind: Deployment
metadata:
  name: snyk-demo-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snyk-demo-app
  template:
    metadata:
      labels:
        app: snyk-demo-app
    spec:
      containers:
      - name: app
        image: node:14-alpine
        securityContext:
          privileged: true
          runAsUser: 0
        ports:
        - containerPort: 3000
        resources: {}
      volumes:
      - name: host-volume
        hostPath:
          path: /var/run/docker.sock
